{% set name = "pip-autoremove" %}
{% set version = "0.10.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pip-autoremove-{{ version }}.tar.gz
  sha256: 1328c6f6ef54b1ea51dd4dd78199d7f8b27c2344e9517fbb4f89edf3bfbb32ba

build:
  noarch: python
  number: 1
  entry_points:
    - pip-autoremove = pip_autoremove:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - pip
    - python >={{ python_min }}
    - setuptools

test:
  commands:
    - pip check
    - pip-autoremove --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/invl/pip-autoremove
  summary: Remove a package and its unused dependencies
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
